appId: com.videotools.compressor
productName: Video Compressor
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
asarUnpack:
  - resources/**
  - '**/node_modules/ffmpeg-static/**/*'
  - '**/node_modules/ffprobe-static/**/*'
win:
  executableName: VideoCompressor
  target:
    - nsis
nsis:
  artifactName: VideoCompressor-${version}-setup.${ext}
  shortcutName: Video Compressor
  uninstallDisplayName: Video Compressor
  createDesktopShortcut: always
  oneClick: true
  allowToChangeInstallationDirectory: false
mac:
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    - NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    - NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
  notarize: false
  target:
    - dmg
dmg:
  artifactName: VideoCompressor-${version}.${ext}
linux:
  target:
    - deb
  maintainer: ankit-kumar-dwivedi
  category: Utility
npmRebuild: false
