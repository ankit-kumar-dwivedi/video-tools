name: Build Installers

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
    - name: Check out Git repository
      uses: actions/checkout@v4

    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install Dependencies
      working-directory: video-compressor
      run: npm install

    - name: Build Mac DMG
      working-directory: video-compressor
      run: npx electron-vite build && npx electron-builder --mac --publish never

    - name: Upload Mac Artifact
      uses: actions/upload-artifact@v4
      with:
        name: VideoCompressor-mac-dmg
        path: video-compressor/dist/*.dmg

  build-windows:
    runs-on: windows-latest
    steps:
    - name: Check out Git repository
      uses: actions/checkout@v4

    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install Dependencies
      working-directory: video-compressor
      run: npm install

    - name: Build Windows EXE
      working-directory: video-compressor
      run: npx electron-vite build && npx electron-builder --win --publish never

    - name: Upload Windows Artifact
      uses: actions/upload-artifact@v4
      with:
        name: VideoCompressor-windows-exe
        path: video-compressor/dist/*.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
    - name: Check out Git repository
      uses: actions/checkout@v4

    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install Dependencies
      working-directory: video-compressor
      run: npm install

    - name: Build Linux DEB
      working-directory: video-compressor
      run: npx electron-vite build && npx electron-builder --linux --publish never

    - name: Upload Linux Artifact
      uses: actions/upload-artifact@v4
      with:
        name: VideoCompressor-linux-deb
        path: video-compressor/dist/*.deb
